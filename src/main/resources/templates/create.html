<!DOCTYPE html>
<html class="h-full bg-gray-100" xmlns:th="http://www.thymeleaf.org">
<html class="h-full bg-gray-100" lang="en">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
<head>
    <meta charset="UTF-8">
    <title>Home</title>
</head>

<body class="h-full">

<!-- Include this script tag or install `@tailwindplus/elements` via npm: -->
<!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script> -->
<!--
  This example requires updating your template:

  ```
  <html class="h-full bg-gray-100">
  <body class="h-full">
  ```
-->


    <main>
        <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
            <!-- Your content -->
            <div class="isolate bg-white px-6 py-24 sm:py-32 lg:px-8">
                <div aria-hidden="true" class="absolute inset-x-0 -top-40 -z-10 transform-gpu overflow-hidden blur-3xl sm:-top-80">
                    <div style="clip-path: polygon(74.1% 44.1%, 100% 61.6%, 97.5% 26.9%, 85.5% 0.1%, 80.7% 2%, 72.5% 32.5%, 60.2% 62.4%, 52.4% 68.1%, 47.5% 58.3%, 45.2% 34.5%, 27.5% 76.7%, 0.1% 64.9%, 17.9% 100%, 27.6% 76.8%, 76.1% 97.7%, 74.1% 44.1%)" class="relative left-1/2 -z-10 aspect-1155/678 w-144.5 max-w-none -translate-x-1/2 rotate-30 bg-linear-to-tr from-[#ff80b5] to-[#9089fc] opacity-30 sm:left-[calc(50%-40rem)] sm:w-288.75"></div>
                </div>
                <div></div>
                <div class="mx-auto max-w-2xl text-center">
                    <h2 class="text-4xl font-semibold tracking-tight text-balance text-gray-900 sm:text-5xl" th:text="${customer.id==null?'Add new customer':'Edit '+customer.fullName+' '+customer.lastName}">Add New Customer</h2>
<!--                    <p class="mt-2 text-lg/8 text-gray-600">Aute magna irure deserunt veniam aliqua magna enim voluptate.</p>-->
                </div>
                <form th:action="@{'/save'}" th:method="POST"  th:object="${customer}" class="mx-auto mt-16 max-w-xl sm:mt-20">
                    <input type="hidden" th:field="${customer.id}">
                    <div class="grid grid-cols-1 gap-x-8 gap-y-6 sm:grid-cols-2">
                        <div>
                            <label for="fullname" class="block text-sm/6 font-semibold text-gray-900">First name</label>
                            <div class="mt-2.5">
                                <input id="fullname" th:field="${customer.fullName}" type="text"  autocomplete="given-name" class="block w-full rounded-md bg-white px-3.5 py-2 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600" />
                                <div th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="text-red-600 text-sm mt-1"></div>
                            </div>


                        </div>
                        <div>
                            <label for="lastname" class="block text-sm/6 font-semibold text-gray-900">Last name</label>
                            <div class="mt-2.5">
                                <input id="lastname" th:field="${customer.lastName}" type="text"  autocomplete="family-name" class="block w-full rounded-md bg-white px-3.5 py-2 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600" />
                            <div  th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="text-red-600 text-sm mt-1"></div>
                        </div>

                        </div>

                        <div class="sm:col-span-2">
                            <label for="email" class="block text-sm/6 font-semibold text-gray-900">Email</label>
                            <div class="mt-2.5">
                                <input id="email" type="email"  th:field="${customer.email}" autocomplete="email" class="block w-full rounded-md bg-white px-3.5 py-2 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600" />
                                <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-600 text-sm mt-1"></div>
                            </div>
                        </div>
                    <div class="sm:col-span-2">
                        <label for="phone" class="block text-sm/6 font-semibold text-gray-900">Phone</label>
                        <div class="mt-2.5">
                            <input id="phone"  th:field="${customer.phone}" type="text"  class="block w-full rounded-md bg-white px-3.5 py-2 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600" />
                            <div th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="text-white-600 text-sm mt-1"></div>
                        </div>
                    </div>


                    </div>

                    <div class="mt-10 flex justify-center">
                        <button type="submit" class="rounded-md bg-indigo-600 px-10 py-2.5 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
                            Submit
                        </button>
                    </div>

                </form>





                    </div>

            </div>
    </main>
</body>
</html>
